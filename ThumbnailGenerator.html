<!DOCTYPE html>
<html>
<head>
  <title>Thumbnail Generator</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding-top: 80px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      padding: 15px 20px;
      background: #fff;
      text-align: left;
      box-shadow: 0px 2px 15px rgba(0, 0, 0, 0.15);
      z-index: 100;
    }

    .header h1 {
      font-size: 1.8em;
      color: #333;
    }

    .header a {
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }

    .header a:hover {
      color: #667eea;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .info-section {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .info-section h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 1.5em;
    }

    .info-section p {
      color: #666;
      font-size: 1.05em;
    }

    .outer-container {
      background: #fff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
    }

    .drop-area {
      width: 1000px;
      height: 1000px;
      border: 3px dashed #667eea;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-gap: 15px;
      background: #f9f9f9;
      transition: all 0.3s ease;
      padding: 20px;
      align-content: start;
      max-width: 100%;
    }

    .drop-area:hover {
      background-color: #f0f4ff;
      border-color: #764ba2;
    }

    .drop-area.highlight {
      background-color: #e8f0fe;
      border-color: #667eea;
      box-shadow: 0px 0px 20px rgba(102, 126, 234, 0.3);
    }

    .image-thumbnail {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
      height: 100%;
    }

    .image-thumbnail img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      padding: 10px;
    }

    .image-thumbnail:hover {
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(-5px);
    }

    .image-thumbnail:hover .remove-button {
      opacity: 1;
    }

    .remove-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #ff4444;
      color: white;
      border: none;
      padding: 0;
      font-size: 18px;
      height: 35px;
      width: 35px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .remove-button:hover {
      background-color: #cc0000;
      transform: scale(1.1);
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    button {
      padding: 15px 40px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
    }

    #downloadButton {
      background: linear-gradient(135deg, #a7c957 0%, #6a994e 100%);
      color: white;
    }

    #downloadButton:hover {
      transform: translateY(-3px);
      box-shadow: 0px 8px 25px rgba(106, 153, 78, 0.4);
    }

    #downloadButton:active {
      transform: translateY(-1px);
    }

    #downloadButton:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    #clearButton {
      background: linear-gradient(135deg, #ae2012 0%, #9b2226 100%);
      color: white;
    }

    #clearButton:hover {
      transform: translateY(-3px);
      box-shadow: 0px 8px 25px rgba(174, 32, 18, 0.4);
    }

    #clearButton:active {
      transform: translateY(-1px);
    }

    .status-message {
      padding: 12px 20px;
      margin-top: 15px;
      border-radius: 5px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status-message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status-message.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
      display: block;
    }

    .image-count-display {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 1100px) {
      .drop-area {
        width: 100%;
        height: 600px;
      }
    }

    @media (max-width: 768px) {
      .drop-area {
        height: 400px;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1><a href="main.html">📸 Generators</a></h1>
  </div>

  <div class="container">
    <div class="info-section">
      <h2>Thumbnail Generator</h2>
      <p>Drag and drop images or paste from clipboard to create a 1000x1000px thumbnail. Maximum 4 images (2x2 grid).</p>
    </div>

    <div class="outer-container">
      <div>
        <div class="drop-area" id="imageInputs"></div>
        <div class="image-count-display">
          <span id="imageCount">0</span>/4 images
        </div>
        <div id="statusMessage" class="status-message"></div>
      </div>
    </div>

    <div class="button-container">
      <button type="button" id="downloadButton" onclick="generateImage()">📥 Generate Image</button>
      <button type="button" id="clearButton" onclick="clearImages()">🗑️ Clear All</button>
    </div>
  </div>

  <script>
    const MAX_IMAGES = 4;
    const dropArea = document.getElementById('imageInputs');
    const statusMessage = document.getElementById('statusMessage');

    // Prevent default drag behaviors
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
      document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    // Highlight drop area when item is dragged over it
    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
      dropArea.classList.add('highlight');
    }

    function unhighlight(e) {
      dropArea.classList.remove('highlight');
    }

    // Handle dropped files
    dropArea.addEventListener('drop', handleDrop, false);

    // Handle pasted images
    document.addEventListener('paste', handlePaste, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleFiles(files);
    }

    function handlePaste(e) {
      const items = e.clipboardData.items;
      const files = [];
      
      for (let i = 0; i < items.length; i++) {
        if (items[i].kind === 'file') {
          const file = items[i].getAsFile();
          if (file.type.startsWith('image/')) {
            files.push(file);
          }
        }
      }
      
      if (files.length > 0) {
        handleFiles(files);
      }
    }

    function handleFiles(files) {
      const currentCount = document.querySelectorAll('.image-thumbnail').length;
      let validFiles = 0;
      let rejectedFiles = 0;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];

        if (!file.type.startsWith('image/')) {
          rejectedFiles++;
          continue;
        }

        if (currentCount + validFiles >= MAX_IMAGES) {
          showStatus(`Maximum ${MAX_IMAGES} images reached!`, 'warning');
          break;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          addImageToThumbnail(event.target.result, file.name);
          updateImageCount();
        };

        reader.onerror = () => {
          showStatus('Error reading file: ' + file.name, 'error');
        };

        reader.readAsDataURL(file);
        validFiles++;
      }

      if (rejectedFiles > 0) {
        showStatus(`${rejectedFiles} non-image file(s) were ignored.`, 'warning');
      }
    }

    function addImageToThumbnail(imageURL, fileName) {
      const imageElement = document.createElement('div');
      imageElement.className = 'image-thumbnail';

      const img = document.createElement('img');
      img.src = imageURL;
      img.alt = fileName || 'Image';

      const removeButton = document.createElement('button');
      removeButton.className = 'remove-button';
      removeButton.textContent = '✕';
      removeButton.type = 'button';
      removeButton.title = 'Remove image';
      removeButton.onclick = (e) => {
        e.stopPropagation();
        imageElement.remove();
        updateImageCount();
      };

      imageElement.appendChild(img);
      imageElement.appendChild(removeButton);
      dropArea.appendChild(imageElement);
    }

    function updateImageCount() {
      const count = document.querySelectorAll('.image-thumbnail').length;
      document.getElementById('imageCount').textContent = count;
      
      // Enable/disable button based on image count
      document.getElementById('downloadButton').disabled = count === 0;
    }

    function clearImages() {
      if (dropArea.children.length === 0) {
        showStatus('Nothing to clear!', 'warning');
        return;
      }

      if (confirm('Are you sure you want to clear all images?')) {
        dropArea.innerHTML = '';
        updateImageCount();
        showStatus('All images cleared.', 'success');
      }
    }

    function generateImage() {
      if (dropArea.children.length === 0) {
        showStatus('Please add at least one image!', 'error');
        return;
      }

      const downloadButton = document.getElementById('downloadButton');
      downloadButton.disabled = true;
      downloadButton.textContent = '⏳ Generating...';

      // Remove border before generating
      dropArea.style.border = 'none';
      dropArea.style.background = '#fff';

      html2canvas(dropArea, {
        backgroundColor: '#ffffff',
        scale: 2,
        logging: false,
        useCORS: true
      }).then(function(canvas) {
        const link = document.createElement('a');
        link.download = `thumbnail_1000x1000_${new Date().toISOString().slice(0, 10)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        // Restore border
        dropArea.style.border = '3px dashed #667eea';
        dropArea.style.background = '#f9f9f9';
        
        downloadButton.disabled = false;
        downloadButton.textContent = '📥 Generate Image';
        showStatus('Thumbnail generated successfully!', 'success');
      }).catch(function(error) {
        console.error('Error generating image:', error);
        showStatus('Error generating image. Please try again.', 'error');
        dropArea.style.border = '3px dashed #667eea';
        dropArea.style.background = '#f9f9f9';
        downloadButton.disabled = false;
        downloadButton.textContent = '📥 Generate Image';
      });
    }

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${type}`;
      
      if (type === 'success' || type === 'warning') {
        setTimeout(() => {
          statusMessage.className = 'status-message';
        }, 4000);
      }
    }

    // Initialize
    updateImageCount();
  </script>
</body>
</html>
